name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Auditoría de dependencias (supply-chain)
        # Solo falla ante vulnerabilidades high/critical (accionables); las moderate
        # transitivas y no explotables no rompen el gate. Hoy: 0 vulnerabilidades.
        run: npm audit --audit-level=high
      - name: Validar datos
        run: node scripts/validate-data.mjs
      - name: Tests de regresión del índice
        run: npm test
      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Instalar navegador de Playwright
        # Reintento tolerante: el paso apt de --with-deps a veces choca con un mirror
        # transitorio (p. ej. packages.microsoft.com InRelease inválido). El fallo es de
        # infraestructura del runner, no del test; un par de reintentos lo resuelven.
        run: |
          for i in 1 2 3; do
            npx playwright install --with-deps chromium && exit 0
            echo "instalación falló (intento $i/3), reintentando en 15s…"; sleep 15
          done
          echo "fallback: instalar el navegador sin deps del SO (ubuntu-latest ya trae la mayoría)"
          npx playwright install chromium
      - name: Smoke E2E (la app renderiza de verdad)
        run: npm run e2e
